# Overtake — static publish, no build step (pages are generated locally
# via `npm run build` and committed).
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/og/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
